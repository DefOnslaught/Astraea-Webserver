server {
    listen 80;
    server_name localhost;

    # 1. Django Static Files
    location /static/ {
        alias /app/backend/staticfiles/;
        expires max;
    }

    # 2. Frontend Assets (Vite build)
    location /assets/ {
        alias /app/frontend/dist/assets/;
        expires 30d;
    }

    # 3. API and Admin (Forward to Gunicorn container)
    location ~ ^/(api|admin|api-auth|schema) {
        proxy_pass http://web:8000; # 'web' is the service name in docker-compose
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Frontend Router (Single Page App)
    location / {
        root /app/frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}