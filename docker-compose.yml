services:
  db:
    image: mysql:8.0
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-uroot", "-psecretpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      MYSQL_DATABASE: astraea_db
      MYSQL_ROOT_PASSWORD: secretpassword
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    restart: always

  web:
    build: 
      context: .
      dockerfile: docker/Dockerfile
    image: astraea-app:latest
    command: web
    restart: unless-stopped
    volumes:
      - static_volume:/app/backend/staticfiles
      - frontend_volume:/app/frontend/dist
    environment:
      - DEBUG=False
      - CELERY_BROKER_URL=redis://redis:6379/1
      - DATABASE_URL=mysql://root:secretpassword@db:3306/astraea_db
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/backend/staticfiles:ro
      - frontend_volume:/app/frontend/dist:ro
    depends_on:
      - web
  
  worker:
    image: astraea-app:latest
    command: worker
    restart: unless-stopped
    depends_on:
      - redis
      - db
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - DATABASE_URL=mysql://root:secretpassword@db:3306/astraea_db

  beat:
    image: astraea-app:latest 
    command: beat
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1

volumes:
  mysql_data:
  static_volume:
  frontend_volume: