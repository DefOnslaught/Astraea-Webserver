services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: astraea
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD} # Pulls from .env
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 5s
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - static_volume:/app/backend/staticfiles
      - frontend_volume:/app/frontend/dist
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/backend/staticfiles:ro
      - frontend_volume:/app/frontend/dist:ro
    depends_on:
      - web

volumes:
  mysql_data:
  static_volume:
  frontend_volume: